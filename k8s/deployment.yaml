apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-devops-app

  template:
    metadata:
      labels:
        app: hello-devops-app

    spec:
      containers:
      - name: hello-devops-app
        image: rayyan3210/hello-devops-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000